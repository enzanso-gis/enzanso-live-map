<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>エリアライブマップ</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4VLMJ5GWY3"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-4VLMJ5GWY3');
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <link rel="stylesheet" href="style.css" />

</head>
<body oncontextmenu="return false;" ondragstart="return false;">

<button id="btn-menu" class="mobile-btn" onclick="toggleMenu()">⚙️ メニュー</button>
<button id="btn-legend" class="mobile-btn" onclick="toggleLegend()">📖 凡例</button>

<div id="ui-panel">
    <h3>🔍 絞り込み ＆ 表示切り替え</h3>
    
    <div class="control-group">
        <label>マップテーマ</label>
        <select id="map-theme" onchange="updateUIAndFilters()">
            <option value="ALL">すべて表示</option>
            <option value="indoor">📶 電波強度（屋内調査）</option>
            <option value="outdoor">📶 電波強度（屋外調査）</option>
            <option value="flower">🌸 開花状況</option>
            <option value="autumn">🍁 紅葉状況</option>
            <option value="animal">🐾 動物・鳥類観察</option>
        </select>
    </div>

    <div id="filter-rf-group">
        <div class="control-group">
            <label>キャリア</label>
            <select id="filter-carrier" onchange="applyFilters()">
                <option value="au" selected>au</option>
                <option value="docomo">docomo</option>
                <option value="Wi-Fi">Wi-Fi</option>
            </select>
        </div>
        <div class="control-group" id="filter-weather-group">
            <label>天気</label>
            <select id="filter-weather" onchange="applyFilters()">
                <option value="ALL">すべて表示</option>
                <option value="快晴">快晴</option>
                <option value="晴れ">晴れ</option>
                <option value="曇">曇り</option>
                <option value="雨">雨</option>
                <option value="雪">雪</option>
                <option value="ガス">ガス</option>
            </select>
        </div>
        <div class="control-group" id="filter-wind-str-group" style="display: none;">
            <label>風力</label>
            <select id="filter-wind-str" onchange="applyFilters()">
                <option value="ALL" selected>すべて表示</option>
                <option value="強">強</option>
                <option value="中">中</option>
                <option value="弱">弱</option>
                <option value="無風">無風</option>
            </select>
        </div>
        <div class="control-group" id="filter-wind-dir-group">
            <label>風向</label>
            <select id="filter-wind-dir" onchange="applyFilters()">
                <option value="ALL" selected>すべて表示</option>
                <option value="北">北</option>
                <option value="北東">北東</option>
                <option value="東">東</option>
                <option value="南東">南東</option>
                <option value="南">南</option>
                <option value="南西">南西</option>
                <option value="西">西</option>
                <option value="北西">北西</option>
            </select>
        </div>
        <div class="control-group" id="filter-floor-group" style="display: none;">
            <label>階層</label>
            <select id="filter-floor" onchange="applyFilters()">
                <option value="ALL">すべての階層</option>
            </select>
        </div>
    </div>

    <div id="filter-nature-group" style="display: none;">
        <div class="control-group">
            <label id="filter-species-label">🐾 種類で絞り込み</label>
            <select id="filter-species" onchange="applyFilters()">
                <option value="ALL">すべての種類</option>
            </select>
        </div>
        <div class="control-group" id="filter-nature-weather-group">
            <label>🌤️ 天気で絞り込み</label>
            <select id="filter-nature-weather" onchange="applyFilters()">
                <option value="ALL">すべての天気</option>
            </select>
        </div>
        <div class="control-group" id="filter-nature-date-group">
            <label>📅 日付で絞り込み</label>
            <input type="date" id="filter-date" onchange="applyFilters()" style="width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;">
            <button onclick="document.getElementById('filter-date').value=''; applyFilters();" style="margin-top: 8px; width: 100%; padding: 6px; background-color: #f1f1f1; border: 1px solid #ccc; border-radius: 4px; cursor: pointer;">日付をクリア</button>
        </div>
    </div>

    <hr style="margin: 15px 0; border: 0; border-top: 1px solid #ccc;">
    <h3>📍 場所</h3>
    <div class="control-group" id="jump-control-container" style="display: none;">
        <select id="jump-select">
            <option value="">選択してください</option>
        </select>
        <button onclick="executeJump()">この場所へ移動する</button>
    </div>
</div>

<div id="legend-panel"></div>
<div id="map"></div>

<div id="imageModal" class="modal" onclick="closeModal()">
    <span class="close-modal">&times;</span>
    <div id="modalImage"></div>
</div>

<script src="config.js"></script> <script src="main.js"></script>

</body>
</html>
